name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had
            no activity for 30 days. It will be closed in 14 days if there is no
            further activity. Thank you for your contributions!
          close-issue-message: >
            This issue was closed because it has been inactive for 44 days.
            Feel free to reopen it if it is still relevant.

          # Pull Requests
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has had no activity for 14 days. It will be closed in 7 days if
            there is no further activity.
          close-pr-message: >
            This pull request was closed because it has been inactive for 21 days.
            Feel free to reopen it if it is still relevant.

          # Labels to exempt from staling
          exempt-issue-labels: 'pinned,security,enhancement'
          exempt-pr-labels: 'pinned,security'
